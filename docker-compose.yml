services:
  comma-connect-streamer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comma-connect-streamer
    restart: unless-stopped
    ports:
      - "8554:8554"  # RTSP
      - "8888:8888"  # HLS
      - "8889:8889"  # WebRTC
      - "1935:1935"  # RTMP
    environment:
      - COMMA_JWT_KEY=JWT your_jwt_key_here
      - DISABLE_COMMA=false
    volumes:
      - ./data:/data
      - ./comma_downloads.db:/app/comma_downloads.db
    shm_size: '256mb' # Needed for FIFOs in /dev/shm
