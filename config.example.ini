[COMMON]
FFMPEG_PATH = /usr/bin/ffmpeg
DOWNLOAD_PATH = /dev/shm
LOG_LEVEL = INFO
WRITE_TIMESTAMPS = True

[COMMA]
DONGLE_ID = your_dongle_id_here
FFMPEG_PATH = ${COMMON:FFMPEG_PATH}
