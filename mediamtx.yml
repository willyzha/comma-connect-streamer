# MediaMTX Configuration for Comma Streamer

# Default RTSP port is 8554
# Default RTMP port is 1935
# Default HLS port is 8888
# Default WebRTC port is 8889

paths:
  comma_dashcam:
    # Use ffmpeg to read from the FIFO and transcode to H.264
    # -re ensures it reads at a real-time rate
    # -c:v libx264 ensures modern compatibility (Frigate)
    # -preset superfast reduces CPU load
    runOnInit: ffmpeg -loglevel error -re -i /dev/shm/new_clip.fifo -c:v libx264 -preset superfast -f rtsp rtsp://localhost:8554/comma_dashcam
    runOnInitRestart: yes

# Allow connections from any IP
rtspAddress: :8554
rtmpAddress: :1935
hlsAddress: :8888
webrtcAddress: :8889
